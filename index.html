<style>

*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Space Mono',monospace;color:#fff;user-select:none}
canvas#cv{display:block;position:fixed;inset:0}
#upload{position:fixed;inset:0;z-index:600;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;transition:opacity .5s}
#upload.gone{opacity:0;pointer-events:none}
#upload .logo{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;letter-spacing:6px;background:linear-gradient(135deg,#0cf,#f0f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:24px}
.drop{width:340px;height:180px;border:2px dashed rgba(255,255,255,.15);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:all .3s;position:relative}
.drop:hover,.drop.over{border-color:#0cf;background:rgba(0,200,255,.04)}
.drop svg{opacity:.3}.drop .dt{font-size:11px;opacity:.4;letter-spacing:2px}.drop .db{font-size:10px;padding:5px 16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:4px}

#ov{position:fixed;inset:0;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:500;transition:opacity .4s}

#ov .lf{height:100%;background:linear-gradient(90deg,#0cf,#f0f);width:0%;transition:width .15s}
#ov .ls{margin-top:8px;font-size:8px;opacity:.3;letter-spacing:2px}
#dz{position:fixed;inset:0;z-index:700;background:rgba(0,200,255,.05);border:2px dashed rgba(0,200,255,.3);display:none;align-items:center;justify-content:center}
#dz.s{display:flex}#dz span{font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:3px;color:#0cf}

.g{display:flex;align-items:center;gap:2px;padding:1px 4px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:2px}
.g label{font-size:6px;letter-spacing:.6px;opacity:.3;text-transform:uppercase;white-space:nowrap}
.g select,.g input[type=number]{background:transparent;border:none;color:#fff;font-family:'Space Mono',monospace;font-size:7px;outline:none}
.g select{cursor:pointer}.g select option{background:#111}
.g input[type=color]{width:14px;height:14px;border:1px solid rgba(255,255,255,.08);background:none;cursor:pointer;padding:0;border-radius:1px}

.g input[type=range]{width:40px;height:2px;accent-color:#0cf}
.sp{width:1px;height:10px;background:rgba(255,255,255,.05)}
.btn{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:#fff;padding:1px 6px;font-family:'Space Mono',monospace;font-size:7px;cursor:pointer;letter-spacing:.8px;border-radius:2px;transition:all .2s;white-space:nowrap}
.btn:hover{background:rgba(255,255,255,.07);border-color:rgba(0,200,255,.3)}
.btn.rec{background:rgba(255,50,50,.18);border-color:rgba(255,50,50,.4);color:#f55;animation:rp 1s infinite}
.btn.active{background:rgba(0,200,255,.12);border-color:rgba(0,200,255,.4);color:#0cf}
@keyframes rp{0%,100%{opacity:1}50%{opacity:.5}}
#bb{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:4px 8px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(0deg,rgba(0,0,0,.4)0%,transparent);pointer-events:none;opacity:0;transition:opacity .5s}

.anim-controls{display:none;gap:3px;align-items:center}.anim-controls.show{display:flex}
#audio-viz{position:fixed;bottom:30px;left:8px;width:120px;height:30px;z-index:90;opacity:.4;pointer-events:none;display:none}
#audio-viz.show{display:block}

<script type="module">
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
import {DRACOLoader} from 'three/addons/loaders/DRACOLoader.js';

const $=id=>document.getElementById(id);
const cl=(v,a,b)=>Math.max(a,Math.min(b,v));
const tick=()=>new Promise(r=>setTimeout(r,25));
const loader=new GLTFLoader();const draco=new DRACOLoader();draco.setDecoderPath('https://unpkg.com/three@0.164.1/examples/jsm/libs/draco/');loader.setDRACOLoader(draco);
const sL=(p,t)=>{$('lf').style.width=p+'%';$('ls').textContent=t};
const showOv=()=>{$('ov').classList.add('show');$('ov').classList.remove('fade')};
const hideOv=()=>{$('ov').classList.add('fade');setTimeout(()=>$('ov').classList.remove('show'),400)};
function loadFile(f){return new Promise((r,j)=>{const rd=new FileReader();rd.onload=e=>loader.parse(e.target.result,'',g=>r(g),j);rd.readAsArrayBuffer(f)})}

// ===== AUDIO REACTIVE =====
let audioCtx=null,analyser=null,audioSource=null,audioElement=null,audioData=null;
let audioBass=0,audioMid=0,audioHigh=0,audioEnergy=0;

function setupAudio(file){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioElement){audioElement.pause();audioElement.remove()}
  audioElement=document.createElement('audio');
  audioElement.src=URL.createObjectURL(file);
  audioElement.loop=true;
  if(audioSource){try{audioSource.disconnect()}catch(e){}}
  audioSource=audioCtx.createMediaElementSource(audioElement);
  analyser=audioCtx.createAnalyser();
  analyser.fftSize=512;analyser.smoothingTimeConstant=.8;
  audioSource.connect(analyser);analyser.connect(audioCtx.destination);
  audioData=new Uint8Array(analyser.frequencyBinCount);
  audioElement.play();
  $('audio-viz').classList.add('show');
  $('audio-btn').classList.add('active');
  $('audio-time-g').style.display='flex';
  $('audio-play').style.display='inline-block';
  $('audio-play').textContent='❚❚♪';
  $('audio-play').classList.add('active');
}

function updateAudio(){
  if(!analyser||!audioData)return;
  analyser.getByteFrequencyData(audioData);
  const len=audioData.length;
  let bass=0,mid=0,high=0;
  const bEnd=Math.floor(len*.1),mEnd=Math.floor(len*.4);
  for(let i=0;i<bEnd;i++)bass+=audioData[i];
  for(let i=bEnd;i<mEnd;i++)mid+=audioData[i];
  for(let i=mEnd;i<len;i++)high+=audioData[i];
  audioBass=bass/(bEnd*255);audioMid=mid/((mEnd-bEnd)*255);audioHigh=high/((len-mEnd)*255);
  audioEnergy=(audioBass+audioMid+audioHigh)/3;
  // Draw mini visualizer
  const cv=$('audio-viz'),ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  const bw=cv.width/64;
  for(let i=0;i<64;i++){const v=audioData[Math.floor(i*len/64)]/255;
    ctx.fillStyle=`hsl(${180+v*120},.8,.5)`;ctx.fillRect(i*bw,cv.height*(1-v),bw-1,cv.height*v)}
}

// ===== GLSL =====
const NOISE_GLSL=`
vec3 mod289v(vec3 x){return x-floor(x*(1./289.))*289.;}
vec4 mod289v4(vec4 x){return x-floor(x*(1./289.))*289.;}
vec4 permute(vec4 x){return mod289v4(((x*34.)+1.)*x);}
float snoise3(vec3 v){const vec2 C=vec2(1./6.,1./3.);vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.-g;vec3 i1=min(g,l.zxy);vec3 i2=max(g,l.zxy);vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-.5;i=mod289v(i);vec4 p=permute(permute(permute(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));vec4 j=p-49.*floor(p/49.);vec4 x_=floor(j/7.);vec4 y_=floor(j-7.*x_);vec4 x=x_/7.-.5;vec4 y=y_/7.-.5;vec4 h=1.-abs(x)-abs(y);vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);vec4 s0=floor(b0)*2.+1.;vec4 s1=floor(b1)*2.+1.;vec4 sh=-step(h,vec4(0.));vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);vec4 norm=1.79284291400159-.85373472095314*vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3));p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);m=m*m;return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));}`;

// FX with 7 effects (0=none,1=wave,2=glitch,3=distort,4=explode,5=pulse,6=shatter,7=spiral)
// + audio uniforms
const FX_FUNC=`
uniform float uTime;uniform float uFx;uniform float uAmt;
uniform float uBass;uniform float uMid;uniform float uHigh;
// Nonlinear audio response: silent below threshold, exponential above
float audioReact(float v, float thresh, float power){
  float x=max(0.,v-thresh)/(1.-thresh+.001);
  return pow(x,power);
}
vec3 fxDisplace(vec3 p,float seed){
  float fx=uFx;float amt=uAmt;
  // Audio: threshold .25 means below 25% loudness = zero effect
  // power 2.0 = quadratic curve so only strong beats really punch through
  float aB=audioReact(uBass,.2,2.);
  float aM=audioReact(uMid,.25,2.);
  float aH=audioReact(uHigh,.3,2.5);
  // Audio adds to amt: strong bass can add up to +0.5
  amt+=aB*.5+aM*.2+aH*.1;
  amt=min(amt,2.5);
  if(fx<0.5||amt<0.001)return p;
  if(fx<1.5){p.x+=sin(p.y*4.+uTime*2.)*amt*.4;p.z+=cos(p.y*3.5+uTime*1.5)*amt*.35;p.y+=sin(p.x*5.+uTime*1.2)*amt*.15+aB*.6;}
  else if(fx<2.5){float bid=floor((p.y+2.)*6.);float trig=step(.85-aH*.5,fract(sin(bid*91.2+floor(uTime*8.))*4567.));float sh=(fract(sin(bid*173.1+floor(uTime*12.))*999.)-.5)*2.;p.x+=sh*amt*1.8*trig;float sc=step(.95-aH*.4,fract(sin(seed*9876.+floor(uTime*15.))*5432.));p+=vec3(fract(sin(seed*111.)*.5)-.25,fract(sin(seed*222.)*.5)-.25,fract(sin(seed*333.)*.5)-.25)*amt*sc*1.5;}
  else if(fx<3.5){float n1=snoise3(p*1.2+uTime*.4);float n2=snoise3(p*1.8+vec3(100.,0.,0.)+uTime*.35);float n3=snoise3(p*1.5+vec3(0.,100.,0.)+uTime*.45);p+=vec3(n1,n2,n3)*amt*(1.+aB*2.)*1.2;}
  else if(fx<4.5){vec3 dir=normalize(p+vec3(.001));float wave=sin(length(p)*5.-uTime*4.)*.5+.5;p+=dir*wave*amt*(1.+aB*3.)*1.2;}
  else if(fx<5.5){float beat=pow(abs(sin(uTime*3.14159*1.5)),2.)+aB*2.;p*=1.+beat*amt*.5;p+=normalize(p+vec3(.001))*sin(length(p)*8.-uTime*5.)*.15*amt;}
  else if(fx<6.5){float cell=floor(seed*20.);float burst=step(.7-aB*.4,fract(sin(cell*77.7+floor(uTime*3.))*999.));vec3 dir=normalize(vec3(fract(sin(cell*11.)*.5)-.25,fract(sin(cell*22.)*.5)-.25,fract(sin(cell*33.)*.5)-.25));p+=dir*burst*amt*(2.+aB*4.);p.y-=burst*amt*.5;}
  else{float a=atan(p.z,p.x);float r=length(p.xz);float twist=amt*(2.+aM*4.)*sin(p.y*2.+uTime);a+=twist;p.x=cos(a)*r;p.z=sin(a)*r;p.y+=sin(r*4.-uTime*3.)*.2*amt;}
  return p;
}`;

// ===== COLOR MODE GLSL =====
// Injected as a function that takes position, normal, seed and returns vec3 color
function getColorGLSL(){return `
uniform float uColorMode; // 0=gradient,1=rainbow,2=mono,3=heat,4=depth,5=fresnel
uniform vec3 uColA;uniform vec3 uColB;
uniform float uMinY;uniform float uMaxY;
vec3 hsl2rgb(float h,float s,float l){vec3 c=clamp(abs(mod(h*6.+vec3(0.,4.,2.),6.)-3.)-1.,0.,1.);return l+s*(c-.5)*(1.-abs(2.*l-1.));}
vec3 getColor(vec3 pos,vec3 norm,float seed,vec3 viewDir){
  float t=(pos.y-uMinY)/(uMaxY-uMinY+.001);
  if(uColorMode<0.5)return mix(uColA,uColB,t); // gradient
  if(uColorMode<1.5)return hsl2rgb(t*.85+seed*.1,1.,.55); // rainbow
  if(uColorMode<2.5){float v=t*.5+.3;return vec3(v)*uColA/max(max(uColA.r,uColA.g),uColA.b+.01);} // mono
  if(uColorMode<3.5){return mix(vec3(0.,.1,.4),mix(vec3(1.,.3,0.),vec3(1.,1.,.2),t),t);} // heat
  if(uColorMode<4.5){float d=length(pos)*.3;return mix(uColA,uColB,clamp(d,0.,1.));} // depth
  float f=pow(1.-abs(dot(normalize(norm),viewDir)),2.);return mix(uColA*.2,uColB,f); // fresnel
}`;}

// ===== SURFACE SAMPLING =====
function sampleSurface(root,n){
  root.updateMatrixWorld(true);const ap=[],ai=[];
  root.traverse(c=>{if(!c.isMesh||!c.geometry)return;const g=c.geometry,p=g.attributes.position;if(!p)return;
    let getP;if(c.isSkinnedMesh){const tv=new THREE.Vector3();getP=i=>{tv.fromBufferAttribute(p,i);c.boneTransform(i,tv);tv.applyMatrix4(c.matrixWorld);return tv}}
    else{const m=c.matrixWorld,tv=new THREE.Vector3();getP=i=>{tv.fromBufferAttribute(p,i);tv.applyMatrix4(m);return tv}}
    const sv=ap.length/3;for(let i=0;i<p.count;i++){const v=getP(i);ap.push(v.x,v.y,v.z)}
    if(g.index)for(let i=0;i<g.index.count;i++)ai.push(g.index.getX(i)+sv);else for(let i=0;i<p.count;i++)ai.push(i+sv);});
  if(!ap.length)return new Float32Array(n*3);
  const pos=new Float32Array(ap),idx=ai,tc=Math.floor(idx.length/3);if(!tc)return new Float32Array(n*3);
  const ar=new Float32Array(tc);let ta=0;
  const vA=new THREE.Vector3(),vB=new THREE.Vector3(),vC=new THREE.Vector3(),ab=new THREE.Vector3(),ac=new THREE.Vector3();
  for(let i=0;i<tc;i++){const ia=idx[i*3],ib=idx[i*3+1],ic=idx[i*3+2];vA.set(pos[ia*3],pos[ia*3+1],pos[ia*3+2]);vB.set(pos[ib*3],pos[ib*3+1],pos[ib*3+2]);vC.set(pos[ic*3],pos[ic*3+1],pos[ic*3+2]);ab.subVectors(vB,vA);ac.subVectors(vC,vA);ar[i]=ab.cross(ac).length()*.5;ta+=ar[i]}

// ===== EXTRACT ORIGINAL COLORS FROM TEXTURES/MATERIALS =====
function extractOriginalColors(root){
  // Sample the base color from each mesh's material/texture and bake into a flat color array
  // Returns a Map of mesh.uuid → Float32Array of RGB per vertex
  const colorMap=new Map();
  root.traverse(c=>{
    if(!c.isMesh||!c.geometry)return;
    const geo=c.geometry, pos=geo.attributes.position, uv=geo.attributes.uv;
    const cnt=pos.count;
    const cols=new Float32Array(cnt*3);
    const mat=c.material;
    
    // Try to get base color from material
    let baseColor=new THREE.Color(1,1,1);
    let hasTexture=false, texCanvas=null, texCtx=null, texW=0, texH=0;
    
    if(mat){
      if(mat.color) baseColor=mat.color.clone();
      // Try to read texture pixels
      const map=mat.map||mat.baseColorMap||mat.diffuseMap;
      if(map&&map.image){
        hasTexture=true;
        const img=map.image;
        texCanvas=document.createElement('canvas');
        texW=Math.min(img.width||256,512);texH=Math.min(img.height||256,512);
        texCanvas.width=texW;texCanvas.height=texH;
        texCtx=texCanvas.getContext('2d');
        texCtx.drawImage(img,0,0,texW,texH);
      }
    }
    
    for(let i=0;i<cnt;i++){
      let r=baseColor.r,g=baseColor.g,b=baseColor.b;
      if(hasTexture&&texCtx&&uv){
        const u=uv.getX(i),v=uv.getY(i);
        const px=Math.floor(((u%1+1)%1)*texW);
        const py=Math.floor(((1-((v%1+1)%1)))*texH);
        try{
          const pixel=texCtx.getImageData(Math.min(px,texW-1),Math.min(py,texH-1),1,1).data;
          r=pixel[0]/255;g=pixel[1]/255;b=pixel[2]/255;
        }catch(e){}
      }
      // Vertex colors if present
      if(geo.attributes.color){
        r=geo.attributes.color.getX(i);
        g=geo.attributes.color.getY(i);
        b=geo.attributes.color.getZ(i);
      }
      cols[i*3]=r;cols[i*3+1]=g;cols[i*3+2]=b;
    }
    colorMap.set(c.uuid,cols);
  });
  return colorMap;
}

// Bake original texture colors into sampled particle positions
function sampleOrigColors(root,positions,count){
  root.updateMatrixWorld(true);
  const cols=new Float32Array(count*3);
  // Build a simple spatial lookup: for each particle, find nearest mesh vertex and use its color
  const colorMap=extractOriginalColors(root);
  // Collect all world-space verts with their color
  const allVerts=[],allCols=[];
  root.traverse(c=>{
    if(!c.isMesh||!c.geometry)return;
    const cCols=colorMap.get(c.uuid);if(!cCols)return;
    const geo=c.geometry,pos=geo.attributes.position;
    const v=new THREE.Vector3();
    for(let i=0;i<pos.count;i++){
      v.fromBufferAttribute(pos,i);
      if(c.isSkinnedMesh){c.boneTransform(i,v);v.applyMatrix4(c.matrixWorld)}
      else v.applyMatrix4(c.matrixWorld);
      allVerts.push(v.x,v.y,v.z);
      allCols.push(cCols[i*3],cCols[i*3+1],cCols[i*3+2]);
    }
  });
  if(!allVerts.length){cols.fill(1);return cols}
  // For each particle, find closest vertex (subsample for speed)
  const nv=allVerts.length/3;const step=Math.max(1,Math.floor(nv/8000));
  for(let i=0;i<count;i++){
    const px=positions[i*3],py=positions[i*3+1],pz=positions[i*3+2];
    let bestD=1e9,bestJ=0;
    for(let j=0;j<nv;j+=step){
      const dx=allVerts[j*3]-px,dy=allVerts[j*3+1]-py,dz=allVerts[j*3+2]-pz;
      const d=dx*dx+dy*dy+dz*dz;
      if(d<bestD){bestD=d;bestJ=j}
    }
    cols[i*3]=allCols[bestJ*3];cols[i*3+1]=allCols[bestJ*3+1];cols[i*3+2]=allCols[bestJ*3+2];
  }
  return cols;
}

// Store references when loading
function storeOriginals(root){
  origMaterials=[];
  root.traverse(c=>{if(c.isMesh&&c.material)origMaterials.push({mesh:c,material:c.material.clone?c.material.clone():c.material})});
}

// Bake texture colors directly into extracted geometry's vertex colors
function bakeTexToGeo(root,geo){
  const colorMap=extractOriginalColors(root);
  const pos=geo.attributes.position;
  // Build all world-space verts + colors from original
  const av=[],ac=[];
  root.traverse(c=>{if(!c.isMesh||!c.geometry)return;const cc=colorMap.get(c.uuid);if(!cc)return;
    const p=c.geometry.attributes.position,v=new THREE.Vector3();
    for(let i=0;i<p.count;i++){v.fromBufferAttribute(p,i);
      if(c.isSkinnedMesh){c.boneTransform(i,v);v.applyMatrix4(c.matrixWorld)}else v.applyMatrix4(c.matrixWorld);
      av.push(v.x,v.y,v.z);ac.push(cc[i*3],cc[i*3+1],cc[i*3+2])}});
  if(!av.length)return;
  const nv=av.length/3,step=Math.max(1,Math.floor(nv/6000));
  const cols=new Float32Array(pos.count*3);
  for(let i=0;i<pos.count;i++){
    const px=pos.getX(i),py=pos.getY(i),pz=pos.getZ(i);
    let best=1e9,bj=0;
    for(let j=0;j<nv;j+=step){const dx=av[j*3]-px,dy=av[j*3+1]-py,dz=av[j*3+2]-pz,d=dx*dx+dy*dy+dz*dz;if(d<best){best=d;bj=j}}
    cols[i*3]=ac[bj*3];cols[i*3+1]=ac[bj*3+1];cols[i*3+2]=ac[bj*3+2];
  }
  geo.setAttribute('texColor',new THREE.Float32BufferAttribute(cols,3));
}

  $('drop-area').addEventListener('drop',async e=>{e.preventDefault();e.currentTarget.classList.remove('over');for(const f of e.dataTransfer.files){if(f.name.match(/\.(glb|gltf)$/i))await processFile(f);else if(f.type.startsWith('audio/'))setupAudio(f)}});
  $('anim-toggle').addEventListener('click',()=>{if(!mixer||!activeAction)return;animPlaying=!animPlaying;if(animPlaying){activeAction.paused=false;activeAction.play();$('anim-toggle').textContent='❚❚';$('anim-toggle').classList.add('active')}else{activeAction.paused=true;$('anim-toggle').textContent='▶';$('anim-toggle').classList.remove('active')}});
  $('anim-sel').addEventListener('change',e=>{const idx=parseInt(e.target.value);if(activeAction)activeAction.stop();activeAction=animActions[idx];if(activeAction){activeAction.reset().play();if(!animPlaying)activeAction.paused=true}});
  
  // ===== AUDIO PLAY/PAUSE =====
  $('audio-play').addEventListener('click',()=>{
    if(!audioElement)return;
    if(audioElement.paused){audioElement.play();$('audio-play').textContent='❚❚♪';$('audio-play').classList.add('active')}
    else{audioElement.pause();$('audio-play').textContent='▶♪';$('audio-play').classList.remove('active')}
  });
  
  // ===== AUTO FX CYCLE (switches FX on strong beats) =====
  $('auto-fx').addEventListener('click',()=>{
    autoFxOn=!autoFxOn;
    $('auto-fx').classList.toggle('active',autoFxOn);
    $('auto-fx').textContent=autoFxOn?'AUTO ●':'AUTO';
  });
  
  // ===== RANDOM ALL SETTINGS =====
  $('random-btn').addEventListener('click',()=>{
    $('mode').value=modeOptionsArr[Math.floor(Math.random()*modeOptionsArr.length)];
    $('fx').value=fxOptions[Math.floor(Math.random()*fxOptions.length)];
    // Random AMT
    $('fxa').value=Math.floor(Math.random()*80+10);
    // Random colors
    const rHex=()=>'#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
    $('ca').value=rHex();$('cb').value=rHex();
    // Random color mode
    $('colormode').selectedIndex=Math.floor(Math.random()*$('colormode').options.length);
    // Random light
    $('li').value=Math.floor(Math.random()*80+20);
    dirL.intensity=($('li').value/100)*1.5;ambL.intensity=($('li').value/100)*.5;
    // Random camera
    const camOpts=['orbit','drift','dramatic','top','static'];
    $('cam').value=camOpts[Math.floor(Math.random()*camOpts.length)];
    applyMode();
  });
}

async function processFile(f){
  $('upload').classList.add('gone');showOv();sL(10,'READING...');await tick();
  try{const gltf=await loadFile(f);const scn=gltf.scene;const anims=gltf.animations||[];
    sL(30,'NORMALIZING...');await tick();normalizeScene(scn,3.5);
    // Remove old pivot
    if(pivot){scene.remove(pivot)}
    // Create rotation pivot wrapper
    pivot=new THREE.Group();
    pivot.add(scn);
    scene.add(pivot);
    liveScene=scn;
    storeOriginals(scn);
    if(resampleInterval){clearInterval(resampleInterval);resampleInterval=null}
    mixer=null;animActions=[];activeAction=null;animPlaying=false;hasAnim=anims.length>0;
    if(hasAnim){mixer=new THREE.AnimationMixer(scn);const sel=$('anim-sel');sel.innerHTML='';anims.forEach((c,i)=>{const a=mixer.clipAction(c);a.setLoop(THREE.LoopRepeat);animActions.push(a);const o=document.createElement('option');o.value=i;o.textContent=c.name||`Clip ${i}`;sel.appendChild(o)});activeAction=animActions[0];activeAction.reset().play();animPlaying=true;$('anim-toggle').textContent='❚❚';$('anim-toggle').classList.add('active');$('anim-ui').classList.add('show')}
    else $('anim-ui').classList.remove('show');
    sL(55,'SAMPLING...');await tick();lastPos=sampleSurface(scn,PC);sL(88,'RENDERING...');await tick();applyMode();
    if(hasAnim)resampleInterval=setInterval(()=>{if(!animPlaying||$('mode').value!=='particles')return;liveScene.updateMatrixWorld(true);lastPos=sampleSurface(liveScene,PC);applyMode()},200);
    sL(100,'');await tick();hideOv();$('top').classList.add('vis');$('bb').classList.add('vis');$('info').textContent=f.name.replace(/\.\w+$/,'')+(hasAnim?' — ANIMATED':'');
  }catch(e){console.error(e);sL(0,'ERROR');setTimeout(()=>{hideOv();$('upload').classList.remove('gone')},2000)}}

function applyMode(){
  if(grp){scene.remove(grp);grp.traverse(c=>{if(c.geometry)c.geometry.dispose();if(c.material)c.material.dispose()});grp=null}
  if(!liveScene&&!lastPos)return;
  const mode=$('mode').value,fxV=parseFloat($('fx').value),amtV=$('fxa').value/100;
  grp=new THREE.Group();
  
  // ORIGINAL mode: show the GLB with its own materials/textures
  if(mode==='original'){
    // Hide liveScene's custom shader visuals, show original meshes directly
    liveScene.visible=true;
    liveScene.traverse(c=>{if(c.isMesh){
      // Restore original material
      const orig=origMaterials.find(o=>o.mesh===c);
      if(orig)c.material=orig.material;
      c.visible=true;
    }});
    scene.add(grp); // empty grp, the liveScene in pivot is already visible
    return;
  }
  
  // For all other modes, hide the original model visuals
  liveScene.traverse(c=>{if(c.isMesh)c.visible=false});
  liveScene.updateMatrixWorld(true);
  
  if(mode==='particles'&&lastPos){
    const pos=lastPos,cnt=pos.length/3,geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(pos.slice(),3));
    const{mny,mxy}=getBounds({getY:i=>pos[i*3+1],count:cnt});
    addAttribs(geo);
    // If TEX is on, bake original texture colors into vertex colors
    if(useTexColors){
      const texCols=sampleOrigColors(liveScene,pos,cnt);
      geo.setAttribute('texColor',new THREE.BufferAttribute(texCols,3));
    }
    grp.add(new THREE.Points(geo,mkPtsMat(fxV,amtV,mny,mxy)));
  }
  else if(mode==='mesh'){
    const geo=extractGeo(liveScene);addAttribs(geo);const{mny,mxy}=getBounds(geo.attributes.position);
    if(useTexColors)bakeTexToGeo(liveScene,geo);
    grp.add(new THREE.Mesh(geo,mkWireMat(fxV,amtV,mny,mxy)));
  }
  else if(mode==='solid'){
    const geo=extractGeo(liveScene);addAttribs(geo);const{mny,mxy}=getBounds(geo.attributes.position);
    if(useTexColors)bakeTexToGeo(liveScene,geo);
    grp.add(new THREE.Mesh(geo,mkSolidMat(fxV,amtV,mny,mxy)));
    const wg=geo.clone();wg.setAttribute('aR',geo.attributes.aR.clone());
    if(geo.attributes.texColor)wg.setAttribute('texColor',geo.attributes.texColor.clone());
    grp.add(new THREE.Mesh(wg,mkSimpleFxMat(fxV,amtV,mny,mxy)));
  }
  else if(mode==='pointlines'&&lastPos){
    // Particles + connecting lines between nearby points
    const pos=lastPos,cnt=pos.length/3,geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(pos.slice(),3));
    const{mny,mxy}=getBounds({getY:i=>pos[i*3+1],count:cnt});
    addAttribs(geo);grp.add(new THREE.Points(geo,mkPtsMat(fxV,amtV,mny,mxy)));
    // Build line connections
    const cs=.07,h={},sn=Math.min(cnt,25000),step=Math.max(1,Math.floor(cnt/sn));
    const idxs=[];for(let j=0;j<cnt;j+=step)idxs.push(j);
    for(const i of idxs){const x=pos[i*3],y=pos[i*3+1],z=pos[i*3+2];const k=`${Math.floor(x/cs)},${Math.floor(y/cs)},${Math.floor(z/cs)}`;if(!h[k])h[k]=[];h[k].push(i)}
    const lp=[];let lCnt=0;const md=cs*1.3,md2=md*md,ML=200000;
    for(const k in h){if(lCnt>=ML)break;const cell=h[k];const[cx,cy,cz]=k.split(',').map(Number);
      for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++)for(let dz=-1;dz<=1;dz++){const nk=`${cx+dx},${cy+dy},${cz+dz}`;const nc=h[nk];if(!nc)continue;
        for(const ai of cell){if(lCnt>=ML)break;const ax=pos[ai*3],ay=pos[ai*3+1],az=pos[ai*3+2];
          for(const bi of nc){if(bi<=ai||lCnt>=ML)continue;const d2=(ax-pos[bi*3])**2+(ay-pos[bi*3+1])**2+(az-pos[bi*3+2])**2;
            if(d2<md2){lp.push(ax,ay,az,pos[bi*3],pos[bi*3+1],pos[bi*3+2]);lCnt++}}}}}
    if(lCnt>0){const lg=new THREE.BufferGeometry();lg.setAttribute('position',new THREE.Float32BufferAttribute(lp,3));
      const rn=new Float32Array(lCnt*2);for(let i=0;i<rn.length;i++)rn[i]=Math.random();
      lg.setAttribute('aR',new THREE.Float32BufferAttribute(rn,1));
      grp.add(new THREE.LineSegments(lg,mkWireMat(fxV,amtV,mny,mxy)))}
  }
  else if(mode==='xray'){
    const geo=extractGeo(liveScene);addAttribs(geo);const{mny,mxy}=getBounds(geo.attributes.position);
    if(useTexColors)bakeTexToGeo(liveScene,geo);
    grp.add(new THREE.Mesh(geo,mkXrayMat(fxV,amtV,mny,mxy)));
    const wg=geo.clone();wg.setAttribute('aR',geo.attributes.aR.clone());
    if(geo.attributes.texColor)wg.setAttribute('texColor',geo.attributes.texColor.clone());
    const wm=mkWireMat(fxV,amtV,mny,mxy);wm.opacity=.12;grp.add(new THREE.Mesh(wg,wm));
  }
  scene.add(grp);
}

// ===== RENDER ONE FRAME at given time t =====
function renderFrame(t){
  const fxV=parseFloat($('fx').value),amtV=$('fxa').value/100;
  // Update animation mixer to this exact time
  // (mixer.update takes delta, so we track offlineT)
  // Camera
  const camM=$('cam').value;
  if(camM!=='static'&&!drag){let th,ph;switch(camM){case'orbit':th=t*.3;ph=Math.PI/3.2;break;case'drift':th=t*.08+Math.sin(t*.15)*.5;ph=Math.PI/3+Math.sin(t*.12)*.2;break;case'dramatic':th=t*.2+Math.sin(t*.3)*.8;ph=Math.PI/4+Math.sin(t*.15)*.6;break;case'top':th=t*.15;ph=.3+Math.sin(t*.1)*.15;break;default:th=t*.3;ph=Math.PI/3.2}cT+=(th-cT)*.03;cP+=(ph-cP)*.03}else{cT+=(tT-cT)*.08;cP+=(tP-cP)*.08}
  const r=cR+(camM==='dramatic'?Math.sin(t*.2)*1.5:0);
  cam.position.x=Math.sin(cP)*Math.cos(cT)*r;cam.position.y=Math.cos(cP)*r;cam.position.z=Math.sin(cP)*Math.sin(cT)*r;cam.lookAt(0,0,0);
  // Update all shader uniforms
  if(grp)grp.traverse(c=>{if(c.material?.uniforms){const u=c.material.uniforms;
    if(u.uTime!==undefined)u.uTime.value=t;if(u.uFx!==undefined)u.uFx.value=fxV;if(u.uAmt!==undefined)u.uAmt.value=amtV;
    if(u.uBass!==undefined)u.uBass.value=audioBass;if(u.uMid!==undefined)u.uMid.value=audioMid;if(u.uHigh!==undefined)u.uHigh.value=audioHigh;
    if(u.uColA!==undefined)u.uColA.value.set($('ca').value);if(u.uColB!==undefined)u.uColB.value.set($('cb').value);
    if(u.uColorMode!==undefined)u.uColorMode.value=parseFloat($('colormode').selectedIndex);
  }});
  ren.setRenderTarget(renderTarget);ren.render(scene,cam);ren.setRenderTarget(null);
  postMat.uniforms.tDiffuse.value=renderTarget.texture;postMat.uniforms.uTime.value=t;
  postMat.uniforms.uGlitch.value=(fxV>1.5&&fxV<2.5)?amtV:0;postMat.uniforms.uBass.value=audioBass;
  ren.render(postScene,postCam);
}

// ===== LIVE LOOP (preview) =====
let loopRunning=true;
function loop(){
  if(!loopRunning){requestAnimationFrame(loop);return}
  requestAnimationFrame(loop);
  const dt=clk.getDelta();const t=clk.getElapsedTime();
  if(mixer&&animPlaying)mixer.update(dt);
  if(hasAnim&&animPlaying&&($('mode').value==='mesh'||$('mode').value==='solid'||$('mode').value==='xray'))applyMode();
  updateAudio();
  autoFxUpdate(t);
  renderFrame(t);
}

// ===== OFFLINE RENDER (frame-perfect, non-blocking) =====
async function offlineRender(){
  const fps=parseInt($('fps').value);
  const recFrom=parseFloat($('rec-from').value)||0;
  const recTo=parseFloat($('rec-to').value)||5;
  const dur=Math.max(0.1,recTo-recFrom);
  const totalFrames=Math.ceil(fps*dur);
  const dt=1/fps;
  const st=$('rs'),bar=$('pb');

  loopRunning=false;
  
  // Audio start = rec-from position (or audio-start override if set)
  const audioStart=audioElement?((parseFloat($('audio-start').value)||0)+recFrom):0;
  let offlineFFTData=null; // pre-computed per-frame audio data
  
  if(audioElement&&analyser){
    // For offline render, we pre-analyze audio by playing through it quickly
    // But to avoid complexity, we'll just use the live analyser and seek
    // Simpler approach: pre-read audio energy at each frame time
    st.textContent='ANALYZING AUDIO...';
    await new Promise(r=>setTimeout(r,50));
    
    offlineFFTData=[];
    const wasPlaying=!audioElement.paused;
    
    for(let i=0;i<totalFrames;i++){
      const seekTime=audioStart+i*dt;
      if(seekTime<audioElement.duration){
        audioElement.currentTime=seekTime;
        // Need to briefly play to get FFT data
        try{await audioElement.play();await new Promise(r=>setTimeout(r,8));
          analyser.getByteFrequencyData(audioData);
          const len=audioData.length;const bEnd=Math.floor(len*.1),mEnd=Math.floor(len*.4);
          let b=0,m=0,h=0;
          for(let j=0;j<bEnd;j++)b+=audioData[j];for(let j=bEnd;j<mEnd;j++)m+=audioData[j];for(let j=mEnd;j<len;j++)h+=audioData[j];
          offlineFFTData.push({bass:b/(bEnd*255),mid:m/((mEnd-bEnd)*255),high:h/((len-mEnd)*255)});
          audioElement.pause();
        }catch(e){offlineFFTData.push({bass:0,mid:0,high:0})}
      }else{offlineFFTData.push({bass:0,mid:0,high:0})}
      
      if(i%20===0){st.textContent=`AUDIO SCAN ${i+1}/${totalFrames}`;await new Promise(r=>setTimeout(r,0))}
    }
  }
  
  // Now render frames — offset by recFrom so visual state matches the time range
  const startT=clk.getElapsedTime()+recFrom;
  frames=[];
  $('rb').textContent='RENDERING...';$('rb').classList.add('rec');
  
  for(let i=0;i<totalFrames;i++){
    if(!isRec)break; // allow cancel
    
    const frameTime=startT+i*dt;
    
    // Set audio values for this frame
    if(offlineFFTData&&offlineFFTData[i]){
      audioBass=offlineFFTData[i].bass;
      audioMid=offlineFFTData[i].mid;
      audioHigh=offlineFFTData[i].high;
    }
    
    // Advance animation
    if(mixer&&animPlaying)mixer.update(dt);
    
    // For animated mesh/solid, rebuild geometry every 3rd frame
    if(hasAnim&&i%3===0&&($('mode').value==='mesh'||$('mode').value==='solid'||$('mode').value==='xray')){
      liveScene.updateMatrixWorld(true);
      applyMode();
    }
    
    renderFrame(frameTime);
    frames.push(ren.domElement.toDataURL('image/png'));
    
    st.textContent=`RENDER ${i+1}/${totalFrames} (${((i+1)/fps).toFixed(1)}s)`;
    bar.style.width=(i/totalFrames*40)+'%';
    
    // YIELD EVERY FRAME to prevent browser freeze
    await new Promise(r=>setTimeout(r,0));
  }
  
  if(!isRec){loopRunning=true;clk.getDelta();return} // cancelled
  
  // Resume audio
  if(audioElement){audioElement.currentTime=audioStart;try{audioElement.play()}catch(e){}}
  
  loopRunning=true;
  clk.getDelta();
  
  st.textContent='PACKING...';
  await saveZip();
}

function toggleRec(){
  if(!isRec){
    isRec=true;
    offlineRender().then(()=>{isRec=false});
  }else{
    // Allow cancel mid-render
    isRec=false;loopRunning=true;
    $('rb').textContent='● REC';$('rb').classList.remove('rec');
    $('rs').textContent='CANCELLED';setTimeout(()=>$('rs').textContent='',2000);
  }
}

async function saveZip(){
  const st=$('rs'),bar=$('pb');
  if(typeof JSZip==='undefined'){alert('JSZip loading');$('rb').textContent='● REC';return}
  const fps=$('fps').value,zip=new JSZip(),f=zip.folder(`frames_${fps}fps`);
  for(let i=0;i<frames.length;i++){
    f.file(`frame_${String(i).padStart(5,'0')}.png`,frames[i].split(',')[1],{base64:true});
    bar.style.width=(40+i/frames.length*30)+'%';
    st.textContent=`PACK ${i+1}/${frames.length}`;
    if(i%8===0)await new Promise(r=>setTimeout(r,0));
  }
  st.textContent='COMPRESSING...';
  const bl=await zip.generateAsync({type:'blob'},m=>{bar.style.width=(70+m.percent*.3)+'%'});
  const a=document.createElement('a');a.href=URL.createObjectURL(bl);
  a.download=`phantom_${fps}fps_${frames.length}f_${Date.now()}.zip`;a.click();URL.revokeObjectURL(a.href);
  st.textContent=`${frames.length} FRAMES @ ${fps}FPS — DONE`;bar.style.width='0';frames=[];
  $('rb').textContent='● REC';$('rb').classList.remove('rec');
  setTimeout(()=>st.textContent='',4000);
}

init();loop();
